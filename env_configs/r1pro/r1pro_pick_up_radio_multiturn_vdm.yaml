# Usage: uv run capx/envs/launch.py --config-path env_configs/r1pro/r1pro_pick_up_radio_multiturn_vdm.yaml

env:
  _target_: capx.envs.tasks.r1pro.r1pro_pickup_radio.R1ProRadioCodeEnv
  cfg:
    _target_: capx.envs.tasks.base.CodeExecEnvConfig
    low_level: 
      _target_: capx.envs.simulators.r1pro_b1k.R1ProBehaviourLowLevel
      controller_cfg: r1pro_primitives_radio.yaml
    privileged: false
    apis:
      - R1ProControlApi
    prompt: |
      You are controlling a R1Pro robot with API described below.
      Goal: pick up the red radio on the table. You can use sample_grasp_pose to find a grasp pose for the object. There maybe multiple grasp poses candidates for the object.
      You may write python code comments for reasoning but ONLY write the executable Python code and do not write it in code fences.
      The functions (APIs) below are already imported to the environment. If you want to use numpy, you need to import it explicitly.

    multi_turn_prompt: |
      The following code blocks were just executed:
      ```python
      {executed_code}
      ```
      The current console stdout is:
      ```
      {console_stdout}
      ```
      The current console stderr is:
      ```
      {console_stderr}
      ```
      If there were no errors during compilation or execution, the console stderr will be empty. If there were errors, consider regenerating the code.
      Consider querying the environment state through perception-based tool calls and prints to see if the task is completed.
      Please respond with EXACTLY ONE of the following:
      - The word 'REGENERATE' followed immediately by new Python code in a fenced code block (```python...```) if you want to modify the code.
      - The word 'FINISH' if the task appears to be complete
      
api_servers:
  - _target_: capx.serving.launch_sam3_server.main
    device: cpu
    port: 8114
    host: 127.0.0.1

  - _target_: capx.serving.launch_contact_graspnet_server.main
    port: 8115
    host: 127.0.0.1

    
record_video: true
output_dir: ./outputs/r1pro_pick_up_radio_contact_grasp_adjusted_view_multiturn_vdm_20
use_img_differencing: true
use_legacy_multi_turn_decision_prompt: true

trials: 20
resume_idx: 1
num_workers: 1
# use_oracle_code: true