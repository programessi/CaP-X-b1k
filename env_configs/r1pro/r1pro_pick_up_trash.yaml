# Usage: uv run capx/envs/launch.py --config-path env_configs/r1pro/r1pro_pick_up_trash.yaml
env:
  _target_: capx.envs.tasks.r1pro.r1pro_pickup_trash.R1ProTrashCodeEnv
  cfg:
    _target_: capx.envs.tasks.base.CodeExecEnvConfig
    low_level: r1pro_b1k_low_level  
    privileged: false
    apis:
      - R1ProControlApi
    # prompt is inherited from R1ProTrashCodeEnv class default

api_servers:
  - _target_: capx.serving.launch_sam3_server.main
    device: cpu
    port: 8114
    host: 127.0.0.1

  - _target_: capx.serving.launch_contact_graspnet_server.main
    device: cpu
    port: 8115
    host: 127.0.0.1

    
record_video: true
output_dir: ./outputs/r1pro_pick_up_trash

trials: 25
resume_idx: 1
num_workers: 1
# use_oracle_code: true