# Usage:
#   source capx/third_party/b1k/.venv/bin/activate
#   OMNI_KIT_ACCEPT_EULA=YES OMNIGIBSON_HEADLESS=1 \
#   uv run --no-sync --active capx/envs/launch.py \
#     --config-path env_configs/r1pro/r1pro_pick_up_radio_sam2_smoke.yaml \
#     --model MiniMax-M2.7

env:
  _target_: capx.envs.tasks.r1pro.r1pro_pickup_radio.R1ProRadioCodeEnv
  cfg:
    _target_: capx.envs.tasks.base.CodeExecEnvConfig
    low_level:
      _target_: capx.envs.simulators.r1pro_b1k.R1ProBehaviourLowLevel
      controller_cfg: r1pro_primitives_radio.yaml
    privileged: false
    apis:
      - R1ProControlApiSAM2
    prompt: |
      You are controlling a R1Pro robot. Goal: pick up the red radio on the table.
      The visual pipeline uses OWL-ViT for text-conditioned object detection and SAM2 for box-conditioned segmentation. Do not call SAM3 APIs.
      CRITICAL: Write ALL your code in ONE SINGLE continuous Python script. Do NOT split it into multiple code fences or blocks. Do NOT interleave markdown text between code sections. Write everything from import to the final grasp check as one uninterrupted piece of executable Python code.
      You may include inline comments (starting with #) for reasoning.
      The functions (APIs) below are already imported to the environment. If you want to use numpy, you need to import it explicitly.

      --- API Reference ---

      get_env_observation() -> (rgb, depth):
          rgb: (H, W, 3) uint8 np.ndarray
          depth: (H, W) float32 np.ndarray

      get_object_pose(object_name: str, return_bbox_extent: bool = False):
          When return_bbox_extent=False (default): returns EXACTLY 3 values:
              (position: (3,) ndarray, quaternion_wxyz: (4,) ndarray, None)
          When return_bbox_extent=True: returns EXACTLY 5 values:
              (position: (3,) ndarray, quaternion_wxyz: (4,) ndarray, bbox_extent: (3,) ndarray, o3d_points: ndarray, obb: O3D OBB)
          IMPORTANT: you MUST unpack the exact number of values returned based on the flag. When return_bbox_extent=False, unpack only 3 values, NOT 5.

      get_navigation_pose(P_table: ndarray, P_object: ndarray) -> tuple[float, float, float]:
          Returns (x, y, yaw) navigation target pose near the table edge closest to the object.
          P_table and P_object should be point cloud arrays from get_object_pose with return_bbox_extent=True.

      navigate_to_pose(pose_2d: tuple[float, float, float]) -> bool:
          Navigate robot base to (x, y, yaw). Returns True on success.

      sample_grasp_pose(object_name: str) -> (list[ndarray], list[ndarray]) | (None, None):
          Returns (pregrasp_poses, grasp_poses) where each is a list of (position, quaternion_xyzw) tuples.
          Returns (None, None) if no grasp poses found.

      grasp_object(pregrasp_pose, grasp_pose, object_name: str, arm: int = 0) -> None:
          Execute a grasp: open gripper, move to pregrasp, approach grasp, close gripper, lift arm, reset torso.

      check_object_in_hand(arm: int = 0) -> bool:
          Returns True if an object is currently in the gripper.

      lift_arm(arm: int = 0) -> None:
          Lift the arm to a safe height.

      open_gripper(arm: int = 0) -> None / close_gripper(arm: int = 0) -> None

      find_object_base_rotate(object_name: str) -> bool:
          Rotate robot base in place until object is detected. Returns True if found.

      find_object_torso_rotate(object_name: str) -> bool:
          Tilt torso up/down until object is detected. Returns True if found.

api_servers:
  - _target_: capx.serving.launch_owlvit_server.main
    device: cpu
    port: 8117
    host: 127.0.0.1
    model_name: google/owlv2-large-patch14-ensemble

  - _target_: capx.serving.launch_sam2_server.main
    device: cuda
    port: 8113
    host: 127.0.0.1
    model_name: facebook/sam2.1-hiera-large

  - _target_: capx.serving.launch_contact_graspnet_server.main
    port: 8115
    host: 127.0.0.1

record_video: true
output_dir: ./outputs/r1pro_pick_up_radio_sam2_smoke

trials: 1
resume_idx: 1
num_workers: 1
use_oracle_code: false
web_ui: false
